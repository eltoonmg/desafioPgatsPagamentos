# pipeline de integração contínua utilizando GitHub Actions 

# nome da pipeline
name: 'Pipeline Integrada'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

  # Execução por push
  push:
    branches:
     - main
  
  schedule:
  # cronograma de execução
  # 1 - minutos, 2 - Hora, 3 - dia do mês, 4 - mês, 5 - dia da semana
  # Roda a cada 30 min
  - cron: '*/30 * * * *'

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    #permissões para o github actions
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Instalando depêndencia
      - name: Instalar dependências
        run: npm ci

      # executar os testes 
      - name: Executando testes 
        run: npx mocha

      # Instalando o allure CLI:
      - name: Instalar Allure CLI
        if: always()
        run: npm install -g allure-commandline

      # passos para gerar o relatório com Allure
      - name: Gerar relatório Allure
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report

      - name: Configurar Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4